<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=800, height=480, initial-scale=1, user-scalable=no" />
<title>Ukraine Radiation</title>
<style>
  :root{
    --bg:#000000;
    --green:#00C853;
    --blue:#0066CC;
    --red:#D50000;
    --yellow:#FFD400;
    --white:#FFFFFF;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{width:800px;height:480px;overflow:hidden;background:var(--bg);color:var(--white);
    font-family:Arial, Helvetica, "Segoe UI", sans-serif;-webkit-font-smoothing:antialiased}
  .page{position:relative;width:800px;height:480px;padding:14px 18px}
  .hdr{display:flex;align-items:center;justify-content:space-between;height:54px;
    border-bottom:3px solid var(--red);padding-bottom:8px}
  .hdr-left{display:flex;align-items:center;gap:12px}
  .badge{background:var(--red);color:var(--white);font-weight:900;
    padding:4px 10px;letter-spacing:2px;font-size:14px}
  .ttl{font-size:22px;font-weight:900;letter-spacing:1px}
  .ttl .ua{color:var(--yellow)}
  .ttl .rad{color:var(--white)}
  .clock{font-size:14px;color:var(--blue);font-weight:700;letter-spacing:1px;text-align:right;line-height:1.2}
  .clock .t{color:var(--white);font-size:20px}
  .legend{display:flex;gap:14px;align-items:center;font-size:11px;color:#bbb;
    margin-top:8px;letter-spacing:1px}
  .dot{display:inline-block;width:10px;height:10px;border-radius:50%;
    margin-right:4px;vertical-align:middle}
  .dot.green{background:var(--green)}
  .dot.yellow{background:var(--yellow)}
  .dot.red{background:var(--red)}
  .legend .src{margin-left:auto;color:var(--blue);font-weight:700}
  .grid{margin-top:10px;display:grid;grid-template-columns:repeat(3,1fr);
    grid-template-rows:repeat(2,1fr);gap:10px;height:336px}
  .card{position:relative;border:2px solid var(--blue);background:#000;
    padding:10px 12px;display:flex;flex-direction:column;justify-content:space-between;overflow:hidden}
  .card.ok{border-color:var(--green)}
  .card.warn{border-color:var(--yellow)}
  .card.danger{border-color:var(--red)}
  .city{font-size:18px;font-weight:900;letter-spacing:1px}
  .city .pin{color:var(--yellow);margin-right:6px}
  .reg{font-size:10px;color:#888;letter-spacing:1px;margin-top:2px}
  .val-row{display:flex;align-items:baseline;gap:6px}
  .val{font-size:46px;font-weight:900;line-height:1;letter-spacing:-1px}
  .unit{font-size:13px;color:#aaa;font-weight:700;letter-spacing:1px}
  .card.ok .val{color:var(--green)}
  .card.warn .val{color:var(--yellow)}
  .card.danger .val{color:var(--red)}
  .card.err .val{color:#666;font-size:30px}
  .meta{display:flex;align-items:center;justify-content:space-between;
    font-size:10px;color:#888;letter-spacing:1px}
  .pill{font-size:10px;font-weight:900;padding:2px 8px;letter-spacing:1px;color:#000}
  .pill.ok{background:var(--green)}
  .pill.warn{background:var(--yellow)}
  .pill.danger{background:var(--red);color:var(--white)}
  .ftr{position:absolute;left:0;right:0;bottom:0;height:32px;
    background:var(--yellow);color:#000;display:flex;align-items:center;
    justify-content:space-between;padding:0 18px;font-size:11px;font-weight:900;
    letter-spacing:1px}
  .ftr .ok{color:var(--green)}
  .ftr .warn{color:#a07a00}
  .ftr .danger{color:var(--red)}
</style>
</head>
<body>
<div class="page">

  <div class="hdr">
    <div class="hdr-left">
      <div class="badge">LIVE</div>
      <div class="ttl"><span class="ua">UKRAINE</span> &middot; <span class="rad">RADIATION LEVELS</span></div>
    </div>
    <div class="clock">
      <div class="t" id="clock">--:--</div>
      <div id="date">---</div>
    </div>
  </div>

  <div class="legend">
    <span><i class="dot green"></i>SAFE &lt; 0.30</span>
    <span><i class="dot yellow"></i>ELEVATED 0.30 - 1.00</span>
    <span><i class="dot red"></i>HIGH &gt; 1.00 &micro;Sv/h</span>
    <span class="src">SOURCE: SAVEECOBOT.COM</span>
  </div>

  <div class="grid" id="grid"></div>

  <div class="ftr">
    <div>UKRAINE GAMMA DOSE RATE</div>
    <div id="status">FETCHING<span class="ok">...</span></div>
    <div id="updated">UPDATED: ---</div>
  </div>

</div>

<script>
(function(){
  var STATIONS = [
    { name:"KYIV",      region:"CAPITAL",          id:"misto-kyiv" },
    { name:"LVIV",      region:"LVIVSKA OBL.",     id:"lviv" },
    { name:"KHARKIV",   region:"KHARKIVSKA OBL.",  id:"kharkiv" },
    { name:"ODESA",     region:"ODESKA OBL.",      id:"odesa" },
    { name:"DNIPRO",    region:"DNIPROPETROVSK",   id:"dnipro" },
    { name:"CHORNOBYL", region:"EXCLUSION ZONE",   id:"chornobyl" }
  ];

  var PROXY = "https://api.codetabs.com/v1/proxy?quest=";
  var API   = "https://api.saveecobot.com/radiation?city=";
  var REFRESH_MS = 60 * 1000;
  var DISPLAY_TIMEZONE = "Australia/Sydney";

  var grid = document.getElementById("grid");

  STATIONS.forEach(function(s, i){
    var card = document.createElement("div");
    card.className = "card";
    card.id = "c" + i;
    card.innerHTML =
      '<div>' +
        '<div class="city"><span class="pin">&#9679;</span>' + s.name + '</div>' +
        '<div class="reg">' + s.region + '</div>' +
      '</div>' +
      '<div class="val-row">' +
        '<div class="val" data-v>--</div>' +
        '<div class="unit">&micro;Sv/h</div>' +
      '</div>' +
      '<div class="meta">' +
        '<span data-t>--</span>' +
        '<span class="pill" data-p>...</span>' +
      '</div>';
    grid.appendChild(card);
  });

  function classify(v){
    if (v == null || isNaN(v)) return { cls:"err", pill:"warn", label:"NO DATA" };
    if (v < 0.30) return { cls:"ok",     pill:"ok",     label:"SAFE" };
    if (v < 1.00) return { cls:"warn",   pill:"warn",   label:"ELEVATED" };
    return                { cls:"danger",pill:"danger", label:"HIGH" };
  }

  function fetchOne(idx){
    var s = STATIONS[idx];
    var url = PROXY + encodeURIComponent(API + s.id);
    return fetch(url, { cache:"no-store" })
      .then(r => r.json())
      .then(json => {
        if (!json || !json[0]) throw new Error("No data");
        return { value: json[0].value, time: json[0].datetime };
      });
  }
